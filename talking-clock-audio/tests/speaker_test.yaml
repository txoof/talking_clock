# speaker_test.yaml
# Speaker test audio configuration for tca debug
#
# Sentences target specific problem phonemes in clock speech:
#   A: voiced fricative onset + diphthong (three, thirty, thirteen)
#   B: EIG diphthong (eight, eighteen)
#   C: representative clock output, easier phonemes, volume reference
#   D: isolated diphthong + final fricative stress test
#
# HARDWARE NOTE:
# The MAX98357A SD pin must be driven high explicitly (e.g. GP9 -> SD).
# A floating SD pin causes the amp to randomly enter and exit shutdown,
# producing pops and crackle that mimic speaker or DSP problems. This was
# the root cause of audio artifacts observed during initial testing.
# The speaker enclosure also has a significant effect on audio quality -
# test in the final enclosure before tuning filter parameters.
#
# RECOMMENDED BASELINE: no_filter_t24000
# With SD pin driven high and speaker properly enclosed, no highpass filter
# is needed. The soft limiter at 24000 is retained as a safety net against
# occasional hot peaks from Piper TTS. Highpass cutoff variants are retained
# for reference and for testing speakers outside of an enclosure.
#
# Note: highpass cutoffs above 500Hz cause "th" fricatives to drift towards
# "f", which is unacceptable for a speech intelligibility device.

sentences:
  - "Three, thirteen, thirty, three thirty"
  - "Eight, eighteen, eighty eight"
  - "It is half past seven in the evening"
  - "Five fifteen p.m."
  - "Six forty eight a.m."
  - "South, mouth, fourth, fifth"

variants:
  - name: no_processing
    highpass_cutoff: null
    speaker_threshold: null
    label: "no filter, no limiter"

  - name: no_filter_t24000
    highpass_cutoff: null
    speaker_threshold: 24000
    label: "no filter, threshold twenty four thousand"

  - name: 300hz_no_limiter
    highpass_cutoff: 300
    speaker_threshold: null
    label: "three hundred hertz, no limiter"

  - name: 300hz_t16000
    highpass_cutoff: 300
    speaker_threshold: 16000
    label: "three hundred hertz, threshold sixteen thousand"

  - name: 300hz_t24000
    highpass_cutoff: 300
    speaker_threshold: 24000
    label: "three hundred hertz, threshold twenty four thousand"

  - name: 500hz_t16000
    highpass_cutoff: 500
    speaker_threshold: 16000
    label: "five hundred hertz, threshold sixteen thousand"

  - name: 500hz_t24000
    highpass_cutoff: 500
    speaker_threshold: 24000
    label: "five hundred hertz, threshold twenty four thousand"

  - name: 700hz_no_limiter
    highpass_cutoff: 700
    speaker_threshold: null
    label: "seven hundred hertz, no limiter"

  - name: 700hz_t24000
    highpass_cutoff: 700
    speaker_threshold: 24000
    label: "seven hundred hertz, threshold twenty four thousand"

  - name: 1000hz_no_limiter
    highpass_cutoff: 1000
    speaker_threshold: null
    label: "one thousand hertz, no limiter"

  - name: 1000hz_t24000
    highpass_cutoff: 1000
    speaker_threshold: 24000
    label: "one thousand hertz, threshold twenty four thousand"

  - name: 1200hz_t24000
    highpass_cutoff: 1200
    speaker_threshold: 24000
    label: "one thousand two hundred hertz, threshold twenty four thousand"