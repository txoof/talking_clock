locale: nl_NL
description: >
  Dutch time phrases.
  Source YAML for compiling locale-specific Pico rule files.

vocab:
  words:
    oclock: "uur"
    over: "over"
    voor: "voor"
    quarter: "kwart"
    half: "half"
    oh: "nul"
    zero: "nul"
    hundred: "honderd"
    hours: "uur"
    midnight: "middernacht"
    noon: "middag"
    almost: "bijna"

  menu:
    enter: "instellingen"
    exit: "klaar"
    set_time: "tijd instellen"
    set_alarm: "wekker instellen"
    alarm_enabled: "wekker aan"
    alarm_tone: "wekkergeluid"
    voice: "stem"
    announce_interval: "aankondigingsinterval"
    mode: "tijdweergave"

  toggle:
    on: "aan"
    off: "uit"

  interval:
    hourly: "elk uur"
    half: "elk half uur"
    quarter: "elk kwartier"

  voice:
    name: "Nederlands"

  mode:
    operational: "operationeel"
    broadcast: "formeel"
    standard: "standaard"
    casual: "informeel"

  number_words:
    0: "nul"
    1: "een"
    2: "twee"
    3: "drie"
    4: "vier"
    5: "vijf"
    6: "zes"
    7: "zeven"
    8: "acht"
    9: "negen"
    10: "tien"
    11: "elf"
    12: "twaalf"
    13: "dertien"
    14: "veertien"
    15: "vijftien"
    16: "zestien"
    17: "zeventien"
    18: "achttien"
    19: "negentien"
    20: "twintig"
    21: "eenentwintig"
    22: "tweeentwintig"
    23: "drieentwintig"
    24: "vierentwintig"
    25: "vijfentwintig"
    26: "zesentwintig"
    27: "zevenentwintig"
    28: "achtentwintig"
    29: "negenentwintig"
    30: "dertig"
    31: "eenendertig"
    32: "tweeendertig"
    33: "drieendertig"
    34: "vierendertig"
    35: "vijfendertig"
    36: "zesendertig"
    37: "zevenendertig"
    38: "achtendertig"
    39: "negenendertig"
    40: "veertig"
    41: "eenenveertig"
    42: "tweeënveertig"
    43: "drieënveertig"
    44: "vierenveertig"
    45: "vijfenveertig"
    46: "zesenveertig"
    47: "zevenenveertig"
    48: "achtenveertig"
    49: "negenenveertig"
    50: "vijftig"
    51: "eenenvijftig"
    52: "tweeënvijftig"
    53: "drieënvijftig"
    54: "vierenvijftig"
    55: "vijfenvijftig"
    56: "zesenvijftig"
    57: "zevenenvijftig"
    58: "achtenvijftig"
    59: "negenenvijftig"

fields:
  computed:
    h12: "((hour_24 + 11) % 12) + 1"
    next_h12: "(h12 % 12) + 1"
    m_to: "60 - minute"
    day_period:
      when_hour_24_lt_12: "am"
      otherwise: "pm"

modes:
  operational:
    patterns:
      midnight: ["words.midnight"]
      noon: ["words.noon"]
      hundred_hours: ["number_words.{hour_24}", "words.hundred", "words.hours"]
      zero_pad: ["number_words.{hour_24}", "words.zero", "number_words.{minute}", "words.hours"]
      full: ["number_words.{hour_24}", "number_words.{minute}", "words.hours"]

    rules:
      - when: {hour_24_eq: 0, minute_eq: 0}
        pattern: midnight
      - when: {hour_24_eq: 12, minute_eq: 0}
        pattern: noon
      - when: {minute_eq: 0}
        pattern: hundred_hours
      - when: {minute_gt: 0, minute_lt: 10}
        pattern: zero_pad
      - when: {any: true}
        pattern: full

  broadcast:
    patterns:
      midnight: ["words.midnight"]
      noon: ["words.noon"]
      oclock: ["number_words.{hour_24}", "words.oclock"]
      zero_pad: ["number_words.{hour_24}", "words.oh", "number_words.{minute}"]
      full: ["number_words.{hour_24}", "number_words.{minute}"]

    rules:
      - when: {hour_24_eq: 0, minute_eq: 0}
        pattern: midnight
      - when: {hour_24_eq: 12, minute_eq: 0}
        pattern: noon
      - when: {minute_eq: 0}
        pattern: oclock
      - when: {minute_gt: 0, minute_lt: 10}
        pattern: zero_pad
      - when: {any: true}
        pattern: full

  standard:
    patterns:
      midnight: ["words.midnight"]
      noon: ["words.noon"]
      oclock: ["number_words.{hour_24}", "words.oclock"]
      zero_pad: ["number_words.{hour_24}", "words.oh", "number_words.{minute}"]
      full: ["number_words.{hour_24}", "number_words.{minute}"]

    rules:
      - when: {hour_24_eq: 0, minute_eq: 0}
        pattern: midnight
      - when: {hour_24_eq: 12, minute_eq: 0}
        pattern: noon
      - when: {minute_eq: 0}
        pattern: oclock
      - when: {minute_gt: 0, minute_lt: 10}
        pattern: zero_pad
      - when: {any: true}
        pattern: full

  casual:
    patterns:
      midnight: ["words.midnight"]
      noon: ["words.noon"]
      oclock: ["number_words.{h12}", "words.oclock"]
      minutes_over: ["number_words.{minute}", "words.over", "number_words.{h12}"]
      quarter_over: ["words.quarter", "words.over", "number_words.{h12}"]
      half_next: ["words.half", "number_words.{next_h12}"]
      minutes_voor: ["number_words.{m_to}", "words.voor", "number_words.{next_h12}"]
      quarter_voor: ["words.quarter", "words.voor", "number_words.{next_h12}"]
      almost: ["words.almost", "number_words.{next_h12}"]

    special_cases:
      "00:00": midnight
      "12:00": noon

    minute_map:
      0: oclock
      1: oclock
      2: oclock
      3: minutes_over
      4: minutes_over
      5: minutes_over
      6: minutes_over
      7: minutes_over
      8: quarter_over
      9: quarter_over
      10: quarter_over
      11: quarter_over
      12: quarter_over
      13: quarter_over
      14: quarter_over
      15: quarter_over
      16: quarter_over
      17: quarter_over
      18: minutes_over
      19: minutes_over
      20: minutes_over
      21: minutes_over
      22: half_next
      23: half_next
      24: half_next
      25: half_next
      26: half_next
      27: half_next
      28: half_next
      29: half_next
      30: half_next
      31: half_next
      32: half_next
      33: half_next
      34: half_next
      35: half_next
      36: half_next
      37: half_next
      38: minutes_voor
      39: minutes_voor
      40: minutes_voor
      41: minutes_voor
      42: minutes_voor
      43: quarter_voor
      44: quarter_voor
      45: quarter_voor
      46: quarter_voor
      47: quarter_voor
      48: quarter_voor
      49: quarter_voor
      50: minutes_voor
      51: minutes_voor
      52: minutes_voor
      53: minutes_voor
      54: minutes_voor
      55: almost
      56: almost
      57: almost
      58: almost
      59: almost

examples:
  "14:30":
    operational: "veertien dertig uur"
    broadcast: "veertien dertig"
    standard: "veertien dertig"
