locale: nl_NL
description: >
  Dutch time phrases with four standardized output modes.
  Audio generation will automatically deduplicate vocab entries with identical text
  (case-insensitive comparison, but whitespace and punctuation are preserved).

vocab:
  words:
    uur: "uur"
    nul: "nul"
    twaalf: "twaalf"
    over: "over"
    voor: "voor"
    half: "half"
    kwart: "kwart"
    ochtends: "'s ochtends"
    middags: "'s middags"
    avonds: "'s avonds"
    nachts: "'s nachts"
    middernacht: "middernacht"
    middag: "middag"
  menu:
    enter: "instellingen"
    exit: "klaar"
    set_time: "tijd instellen"
    set_alarm: "wekker instellen"
    alarm_enabled: "wekker inschakelen"
    voice: "stem"
    announce_interval: "aankondigingsinterval"
    mode: "tijdformaat"
  toggle:
    on: "aan"
    off: "uit"
  interval:
    hourly: "elk uur"
    half: "elk half uur"
    quarter: "elk kwartier"
  voice:
    name: "N.L. Nederlands"
  mode:
    vocab:
  mode:
    operational: "operationeel"
    broadcast: "uitzending"
    standard: "standaard"
    casual: "informeel"

  number_words:
    0: "nul"
    1: "een"
    2: "twee"
    3: "drie"
    4: "vier"
    5: "vijf"
    6: "zes"
    7: "zeven"
    8: "acht"
    9: "negen"
    10: "tien"
    11: "elf"
    12: "twaalf"
    13: "dertien"
    14: "veertien"
    15: "vijftien"
    16: "zestien"
    17: "zeventien"
    18: "achttien"
    19: "negentien"
    20: "twintig"
    21: "eenentwintig"
    22: "tweeëntwintig"
    23: "drieëntwintig"
    24: "vierentwintig"
    25: "vijfentwintig"
    26: "zesentwintig"
    27: "zevenentwintig"
    28: "achtentwintig"
    29: "negenentwintig"
    30: "dertig"
    31: "eenendertig"
    32: "tweeëndertig"
    33: "drieëndertig"
    34: "vierendertig"
    35: "vijfendertig"
    36: "zesendertig"
    37: "zevenendertig"
    38: "achtendertig"
    39: "negenendertig"
    40: "veertig"
    41: "eenenveertig"
    42: "tweeënveertig"
    43: "drieënveertig"
    44: "vierenveertig"
    45: "vijfenveertig"
    46: "zesenveertig"
    47: "zevenenveertig"
    48: "achtenveertig"
    49: "negenenveertig"
    50: "vijftig"
    51: "eenenvijftig"
    52: "tweeënvijftig"
    53: "drieënvijftig"
    54: "vierenvijftig"
    55: "vijfenvijftig"
    56: "zesenvijftig"
    57: "zevenenvijftig"
    58: "achtenvijftig"
    59: "negenenvijftig"

fields:
  computed:
    hour_24_word: "number_words[hour_24]"
    minute_word: "number_words[minute]"
    hour_12: "((hour_24 + 11) mod 12) + 1"
    hour_12_word: "number_words[hour_12]"
    next_hour_12: "(hour_12 mod 12) + 1"
    next_hour_12_word: "number_words[next_hour_12]"
    minute_to_next: "60 - minute"
    minute_to_next_word: "number_words[minute_to_next]"
    minutes_from_half: "abs(minute - 30)"
    minutes_from_half_word: "number_words[minutes_from_half]"
    day_period:
      when_hour_24_lt_6: "nachts"
      when_hour_24_lt_12: "ochtends"
      when_hour_24_lt_18: "middags"
      otherwise: "avonds"
    day_period_word: "words[day_period]"

modes:
  operational:
    rule_order: ["midnight", "midday", "on_the_hour", "minute_lt_10", "hour_minute"]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{nul}", "{uur}"]
      midday:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{twaalf}", "{uur}"]
      on_the_hour:
        when: {minute_eq: 0}
        tokens: ["{hour_24_word}", "{uur}"]
      minute_lt_10:
        when: {minute_lt: 10, minute_gt: 0}
        tokens: ["{hour_24_word}", "{nul}", "{minute_word}"]
      hour_minute:
        when: {any: true}
        tokens: ["{hour_24_word}", "{minute_word}"]

  broadcast:
    rule_order: ["midnight", "midday", "on_the_hour", "hour_minute"]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{nul}", "{uur}"]
      midday:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{twaalf}", "{uur}"]
      on_the_hour:
        when: {minute_eq: 0}
        tokens: ["{hour_24_word}", "{uur}"]
      hour_minute:
        when: {any: true}
        tokens: ["{hour_24_word}", "{uur}", "{minute_word}"]

  standard:
    rule_order: ["midnight", "midday", "on_the_hour", "hour_minute"]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{twaalf}", "{uur}", "{nachts}"]
      midday:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{twaalf}", "{uur}", "{middags}"]
      on_the_hour:
        when: {minute_eq: 0}
        tokens: ["{hour_12_word}", "{uur}", "{day_period_word}"]
      hour_minute:
        when: {any: true}
        tokens: ["{hour_12_word}", "{uur}", "{minute_word}", "{day_period_word}"]

  casual:
    rule_order: [
      "midnight",
      "midday",
      "on_the_hour",
      "half_hour",
      "kwart_over",
      "kwart_voor",
      "voor_half",
      "over_half",
      "minutes_over",
      "minutes_voor"
    ]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{middernacht}"]
      midday:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{middag}"]
      on_the_hour:
        when: {minute_eq: 0}
        tokens: ["{hour_12_word}", "{uur}"]
      half_hour:
        when: {minute_eq: 30}
        tokens: ["{half}", "{next_hour_12_word}"]
      kwart_over:
        when: {minute_eq: 15}
        tokens: ["{kwart}", "{over}", "{hour_12_word}"]
      kwart_voor:
        when: {minute_eq: 45}
        tokens: ["{kwart}", "{voor}", "{next_hour_12_word}"]
      voor_half:
        when: {minute_gt: 15, minute_lt: 30}
        tokens: ["{minutes_from_half_word}", "{voor}", "{half}", "{next_hour_12_word}"]
      over_half:
        when: {minute_gt: 30, minute_lt: 45}
        tokens: ["{minutes_from_half_word}", "{over}", "{half}", "{next_hour_12_word}"]
      minutes_over:
        when: {minute_lt: 16, minute_gt: 0}
        tokens: ["{minute_word}", "{over}", "{hour_12_word}"]
      minutes_voor:
        when: {minute_gt: 44}
        tokens: ["{minute_to_next_word}", "{voor}", "{next_hour_12_word}"]

rendered_examples:
  midnight:
    "00:00":
      operational: "nul uur"
      broadcast: "nul uur"
      standard: "twaalf uur 's nachts"
      casual: "middernacht"

  morning:
    "11:00":
      operational: "elf uur"
      broadcast: "elf uur"
      standard: "elf uur 's ochtends"
      casual: "elf uur"

    "11:01":
      operational: "elf nul een"
      broadcast: "elf uur een"
      standard: "elf uur een 's ochtends"
      casual: "een over elf"

    "11:07":
      operational: "elf nul zeven"
      broadcast: "elf uur zeven"
      standard: "elf uur zeven 's ochtends"
      casual: "zeven over elf"

    "11:15":
      operational: "elf vijftien"
      broadcast: "elf uur vijftien"
      standard: "elf uur vijftien 's ochtends"
      casual: "kwart over elf"

    "11:20":
      operational: "elf twintig"
      broadcast: "elf uur twintig"
      standard: "elf uur twintig 's ochtends"
      casual: "tien voor half twaalf"

    "11:30":
      operational: "elf dertig"
      broadcast: "elf uur dertig"
      standard: "elf uur dertig 's ochtends"
      casual: "half twaalf"

    "11:35":
      operational: "elf vijfendertig"
      broadcast: "elf uur vijfendertig"
      standard: "elf uur vijfendertig 's ochtends"
      casual: "vijf over half twaalf"

    "11:40":
      operational: "elf veertig"
      broadcast: "elf uur veertig"
      standard: "elf uur veertig 's ochtends"
      casual: "tien over half twaalf"

    "11:45":
      operational: "elf vijfenveertig"
      broadcast: "elf uur vijfenveertig"
      standard: "elf uur vijfenveertig 's ochtends"
      casual: "kwart voor twaalf"

    "11:53":
      operational: "elf drieënvijftig"
      broadcast: "elf uur drieënvijftig"
      standard: "elf uur drieënvijftig 's ochtends"
      casual: "zeven voor twaalf"

  noon:
    "12:00":
      operational: "twaalf uur"
      broadcast: "twaalf uur"
      standard: "twaalf uur 's middags"
      casual: "middag"

    "12:30":
      operational: "twaalf dertig"
      broadcast: "twaalf uur dertig"
      standard: "twaalf uur dertig 's middags"
      casual: "half een"

  afternoon:
    "13:00":
      operational: "dertien uur"
      broadcast: "dertien uur"
      standard: "een uur 's middags"
      casual: "een uur"

    "13:30":
      operational: "dertien dertig"
      broadcast: "dertien uur dertig"
      standard: "een uur dertig 's middags"
      casual: "half twee"

  evening:
    "23:00":
      operational: "drieëntwintig uur"
      broadcast: "drieëntwintig uur"
      standard: "elf uur 's avonds"
      casual: "elf uur"

    "23:07":
      operational: "drieëntwintig nul zeven"
      broadcast: "drieëntwintig uur zeven"
      standard: "elf uur zeven 's avonds"
      casual: "zeven over elf"