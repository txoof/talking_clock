# talking-clock-audio/templates/language_template.yaml
#
# Language configuration template for talking-clock-audio
#
# This file defines phrases and rules for speaking times in a specific language.
# The phrase_generator.py processes this to create audio configurations.
#
# File naming: time_phrases_{locale}.yaml (e.g., time_phrases_en_US.yaml)

locale: xx_XX  # Language_Country code (e.g., en_US, fr_CA, de_DE, is_IS)

description: >
  Brief description of this language variant.
  Mention any special characteristics or regional variations.

# Vocabulary: All words and numbers that can be spoken
vocab:
  # General time-related words
  words:
    # Common time words (customize for your language)
    oclock: "o'clock"           # Hour marker
    past: "past"                # Before/after marker (e.g., "quarter past")
    to: "to"                    # Before marker (e.g., "quarter to")
    quarter: "quarter"          # 15 minutes
    half: "half"                # 30 minutes
    
    # Special times
    midnight: "midnight"
    noon: "noon"
    
    # Period markers (if applicable)
    am: "a.m."
    pm: "p.m."
    morning: "in the morning"   # Optional: more descriptive periods
    afternoon: "in the afternoon"
    evening: "in the evening"
    night: "at night"
    
    # Operational/military mode words (if needed)
    zero: "zero"
    hundred: "hundred"
    hours: "hours"
    
    # Other words as needed for your language
    oh: "oh"                    # For times like "11:07" -> "eleven oh seven"

  # Numbers 0-59 for hours and minutes
  # Must include all values 0-59
  number_words:
    0: "zero"
    1: "one"
    2: "two"
    3: "three"
    4: "four"
    5: "five"
    6: "six"
    7: "seven"
    8: "eight"
    9: "nine"
    10: "ten"
    11: "eleven"
    12: "twelve"
    13: "thirteen"
    14: "fourteen"
    15: "fifteen"
    16: "sixteen"
    17: "seventeen"
    18: "eighteen"
    19: "nineteen"
    20: "twenty"
    21: "twenty one"
    # ... continue through 59

# Computed fields: Values calculated from hour_24 and minute
# These are used in token templates like {hour_12_word}
fields:
  computed:
    # Standard computed fields (usually keep these as-is)
    hour_24_word: "number_words[hour_24]"           # Word for 24h hour
    minute_word: "number_words[minute]"             # Word for minute
    hour_12: "((hour_24 + 11) mod 12) + 1"         # Convert to 12h format
    hour_12_word: "number_words[hour_12]"           # Word for 12h hour
    next_hour_12: "(hour_12 mod 12) + 1"           # Next hour in 12h
    next_hour_12_word: "number_words[next_hour_12]" # Word for next hour
    minute_to_next: "60 - minute"                   # Minutes until next hour
    minute_to_next_word: "number_words[minute_to_next]"
    
    # Day period (customize conditions for your language/culture)
    day_period:
      when_hour_24_lt_12: "am"
      otherwise: "pm"
    day_period_word: "words[day_period]"

# Modes: Different ways of speaking time
# Each mode has rules checked in order (first match wins)
modes:
  # Operational: Military/24-hour precise format
  operational:
    rule_order: ["on_the_hour", "minute_lt_10", "hour_minute"]
    rules:
      on_the_hour:
        when: {minute_eq: 0}
        tokens: ["{hour_24_word}", "{hundred}", "{hours}"]
      minute_lt_10:
        when: {minute_lt: 10, minute_gt: 0}
        tokens: ["{hour_24_word}", "{zero}", "{minute_word}", "{hours}"]
      hour_minute:
        when: {any: true}  # Catch-all rule
        tokens: ["{hour_24_word}", "{minute_word}", "{hours}"]

  # Broadcast: Clear, formal announcements
  broadcast:
    rule_order: ["midnight", "noon", "oclock", "minute_lt_10", "hour_minute"]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{midnight}"]
      noon:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{noon}"]
      oclock:
        when: {minute_eq: 0}
        tokens: ["{hour_12_word}", "{oclock}", "{day_period_word}"]
      minute_lt_10:
        when: {minute_lt: 10, minute_gt: 0}
        tokens: ["{hour_12_word}", "{oh}", "{minute_word}", "{day_period_word}"]
      hour_minute:
        when: {any: true}
        tokens: ["{hour_12_word}", "{minute_word}", "{day_period_word}"]

  # Standard: Clear but less formal than broadcast
  standard:
    rule_order: ["midnight", "noon", "oclock", "minute_lt_10", "hour_minute"]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{midnight}"]
      noon:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{noon}"]
      oclock:
        when: {minute_eq: 0}
        tokens: ["{hour_12_word}", "{oclock}"]
      minute_lt_10:
        when: {minute_lt: 10, minute_gt: 0}
        tokens: ["{hour_12_word}", "{oh}", "{minute_word}"]
      hour_minute:
        when: {any: true}
        tokens: ["{hour_12_word}", "{minute_word}"]

  # Casual: Natural, conversational style
  casual:
    rule_order: [
      "midnight",
      "noon",
      "oclock",
      "quarter_past",
      "half_past",
      "quarter_to",
      "minutes_past",
      "minutes_to"
    ]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{midnight}"]
      noon:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{noon}"]
      oclock:
        when: {minute_eq: 0}
        tokens: ["{hour_12_word}", "{oclock}"]
      quarter_past:
        when: {minute_eq: 15}
        tokens: ["{quarter}", "{past}", "{hour_12_word}"]
      half_past:
        when: {minute_eq: 30}
        tokens: ["{half}", "{past}", "{hour_12_word}"]
      quarter_to:
        when: {minute_eq: 45}
        tokens: ["{quarter}", "{to}", "{next_hour_12_word}"]
      minutes_past:
        when: {minute_lt: 30, minute_gt: 0}
        tokens: ["{minute_word}", "{past}", "{hour_12_word}"]
      minutes_to:
        when: {minute_gt: 30}
        tokens: ["{minute_to_next_word}", "{to}", "{next_hour_12_word}"]

# Examples: Document expected output for verification
# These are for documentation only - not used by the generator
rendered_examples:
  midnight:
    00:00:
      operational: "expected output in operational mode"
      broadcast: "expected output in broadcast mode"
      standard: "expected output in standard mode"
      casual: "expected output in casual mode"
  
  morning:
    11:00:
      operational: "example"
      broadcast: "example"
      standard: "example"
      casual: "example"
    
    11:15:
      operational: "example"
      broadcast: "example"
      standard: "example"
      casual: "example"
  
  # Add more examples covering edge cases for your language