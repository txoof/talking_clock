locale: en_US
description: >
  American English time phrases with four standardized output modes.
  Audio generation will automatically deduplicate vocab entries with identical text
  (case-insensitive comparison, but whitespace and punctuation are preserved).

vocab:
  words:
    am: "a.m."
    pm: "p.m."
    oclock: "o'clock"
    past: "past"
    to: "to"
    quarter: "quarter"
    half: "half"
    oh: "oh"
    zero: "zero"
    hundred: "hundred"
    hours: "hours"
    midnight: "midnight"
    noon: "noon"
  menu:
    enter: "settings"
    exit: "done"
    set_time: "set time"
    set_alarm: "set alarm"
    alarm_enabled: "enable alarm"
    voice: "voice"
    announce_interval: "announcement interval"
  toggle:
    on: "on"
    off: "off"
  interval:
    hourly: "every hour"
    half: "every half hour"
    quarter: "every quarter hour"

  number_words:
    0: "zero"
    1: "one"
    2: "two"
    3: "three"
    4: "four"
    5: "five"
    6: "six"
    7: "seven"
    8: "eight"
    9: "nine"
    10: "ten"
    11: "eleven"
    12: "twelve"
    13: "thirteen"
    14: "fourteen"
    15: "fifteen"
    16: "sixteen"
    17: "seventeen"
    18: "eighteen"
    19: "nineteen"
    20: "twenty"
    21: "twenty one"
    22: "twenty two"
    23: "twenty three"
    24: "twenty four"
    25: "twenty five"
    26: "twenty six"
    27: "twenty seven"
    28: "twenty eight"
    29: "twenty nine"
    30: "thirty"
    31: "thirty one"
    32: "thirty two"
    33: "thirty three"
    34: "thirty four"
    35: "thirty five"
    36: "thirty six"
    37: "thirty seven"
    38: "thirty eight"
    39: "thirty nine"
    40: "forty"
    41: "forty one"
    42: "forty two"
    43: "forty three"
    44: "forty four"
    45: "forty five"
    46: "forty six"
    47: "forty seven"
    48: "forty eight"
    49: "forty nine"
    50: "fifty"
    51: "fifty one"
    52: "fifty two"
    53: "fifty three"
    54: "fifty four"
    55: "fifty five"
    56: "fifty six"
    57: "fifty seven"
    58: "fifty eight"
    59: "fifty nine"

fields:
  computed:
    hour_24_word: "number_words[hour_24]"
    minute_word: "number_words[minute]"
    hour_12: "((hour_24 + 11) mod 12) + 1"
    hour_12_word: "number_words[hour_12]"
    next_hour_12: "(hour_12 mod 12) + 1"
    next_hour_12_word: "number_words[next_hour_12]"
    minute_to_next: "60 - minute"
    minute_to_next_word: "number_words[minute_to_next]"
    day_period:
      when_hour_24_lt_12: "am"
      otherwise: "pm"
    day_period_word: "words[day_period]"

modes:
  operational:
    rule_order: ["on_the_hour", "minute_lt_10", "hour_minute"]
    rules:
      on_the_hour:
        when: {minute_eq: 0}
        tokens: ["{hour_24_word}", "{hundred}", "{hours}"]
      minute_lt_10:
        when: {minute_lt: 10, minute_gt: 0}
        tokens: ["{hour_24_word}", "{zero}", "{minute_word}", "{hours}"]
      hour_minute:
        when: {any: true}
        tokens: ["{hour_24_word}", "{minute_word}", "{hours}"]

  broadcast:
    rule_order: ["midnight", "noon", "oclock", "minute_lt_10", "hour_minute"]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{midnight}"]
      noon:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{noon}"]
      oclock:
        when: {minute_eq: 0}
        tokens: ["{hour_12_word}", "{oclock}", "{day_period_word}"]
      minute_lt_10:
        when: {minute_lt: 10, minute_gt: 0}
        tokens: ["{hour_12_word}", "{oh}", "{minute_word}", "{day_period_word}"]
      hour_minute:
        when: {any: true}
        tokens: ["{hour_12_word}", "{minute_word}", "{day_period_word}"]

  standard:
    rule_order: ["midnight", "noon", "oclock", "minute_lt_10", "hour_minute"]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{midnight}"]
      noon:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{noon}"]
      oclock:
        when: {minute_eq: 0}
        tokens: ["{hour_12_word}", "{oclock}"]
      minute_lt_10:
        when: {minute_lt: 10, minute_gt: 0}
        tokens: ["{hour_12_word}", "{oh}", "{minute_word}"]
      hour_minute:
        when: {any: true}
        tokens: ["{hour_12_word}", "{minute_word}"]

  casual:
    rule_order: [
      "midnight",
      "noon",
      "oclock",
      "quarter_past",
      "half_past",
      "quarter_to",
      "minutes_past",
      "minutes_to"
    ]
    rules:
      midnight:
        when: {hour_24_eq: 0, minute_eq: 0}
        tokens: ["{midnight}"]
      noon:
        when: {hour_24_eq: 12, minute_eq: 0}
        tokens: ["{noon}"]
      oclock:
        when: {minute_eq: 0}
        tokens: ["{hour_12_word}", "{oclock}"]
      quarter_past:
        when: {minute_eq: 15}
        tokens: ["{quarter}", "{past}", "{hour_12_word}"]
      half_past:
        when: {minute_eq: 30}
        tokens: ["{half}", "{past}", "{hour_12_word}"]
      quarter_to:
        when: {minute_eq: 45}
        tokens: ["{quarter}", "{to}", "{next_hour_12_word}"]
      minutes_past:
        when: {minute_lt: 30, minute_gt: 0}
        tokens: ["{minute_word}", "{past}", "{hour_12_word}"]
      minutes_to:
        when: {minute_gt: 30}
        tokens: ["{minute_to_next_word}", "{to}", "{next_hour_12_word}"]

rendered_examples:
  midnight:
    00:00:
      operational: "zero hundred hours"
      broadcast: "midnight"
      standard: "midnight"
      casual: "midnight"

  morning:
    11:00:
      operational: "eleven hundred hours"
      broadcast: "eleven o'clock a.m."
      standard: "eleven o'clock"
      casual: "eleven o'clock"
    
    11:01:
      operational: "eleven zero one hours"
      broadcast: "eleven oh one a.m."
      standard: "eleven oh one"
      casual: "one past eleven"
    
    11:07:
      operational: "eleven zero seven hours"
      broadcast: "eleven oh seven a.m."
      standard: "eleven oh seven"
      casual: "seven past eleven"
    
    11:15:
      operational: "eleven fifteen hours"
      broadcast: "eleven fifteen a.m."
      standard: "eleven fifteen"
      casual: "quarter past eleven"
    
    11:30:
      operational: "eleven thirty hours"
      broadcast: "eleven thirty a.m."
      standard: "eleven thirty"
      casual: "half past eleven"
    
    11:45:
      operational: "eleven forty five hours"
      broadcast: "eleven forty five a.m."
      standard: "eleven forty five"
      casual: "quarter to twelve"
    
    11:53:
      operational: "eleven fifty three hours"
      broadcast: "eleven fifty three a.m."
      standard: "eleven fifty three"
      casual: "seven to twelve"

  noon:
    12:00:
      operational: "twelve hundred hours"
      broadcast: "noon"
      standard: "noon"
      casual: "noon"
    
    12:30:
      operational: "twelve thirty hours"
      broadcast: "twelve thirty p.m."
      standard: "twelve thirty"
      casual: "half past twelve"

  afternoon:
    13:00:
      operational: "thirteen hundred hours"
      broadcast: "one o'clock p.m."
      standard: "one o'clock"
      casual: "one o'clock"
    
    13:30:
      operational: "thirteen thirty hours"
      broadcast: "one thirty p.m."
      standard: "one thirty"
      casual: "half past one"
    
    13:45:
      operational: "thirteen forty five hours"
      broadcast: "one forty five p.m."
      standard: "one forty five"
      casual: "quarter to two"

  evening:
    23:00:
      operational: "twenty three hundred hours"
      broadcast: "eleven o'clock p.m."
      standard: "eleven o'clock"
      casual: "eleven o'clock"
    
    23:07:
      operational: "twenty three zero seven hours"
      broadcast: "eleven oh seven p.m."
      standard: "eleven oh seven"
      casual: "seven past eleven"
