# time_phrases_LOCALE.yaml
#
# Locale phrase configuration for the Talking Clock.
# Replace LOCALE with the locale code, e.g. de_DE, fr_FR, es_ES.
#
# Rename this file to time_phrases_LOCALE.yaml before running tca validate.
#
# Workflow:
#   1. Fill in all sections below.
#   2. Run: tca validate --yaml time_phrases_LOCALE.yaml
#   3. Fix any warnings shown in the Examples section.
#   4. Run: tca generate --yaml time_phrases_LOCALE.yaml --model <path>
#
# To generate this file with help from an LLM, see LOCALE_BUILDER_PROMPT.md.

locale: LOCALE  # e.g. de_DE

description: >
  LANGUAGE_NAME time phrases.
  Source YAML for compiling locale-specific Pico rule files.

# ---------------------------------------------------------------------------
# vocab
#
# All spoken words used by this locale. Each entry maps a symbolic key to
# the text that Piper TTS will speak. Keys must not be changed; only the
# quoted text on the right should be translated.
#
# words        - time-related words
# menu         - settings menu spoken labels
# toggle       - on/off state labels
# interval     - auto-announce interval labels
# voice        - the name spoken when this voice is selected in the menu
# mode         - spoken names for each announcement mode
# number_words - spoken forms of 0-59
# ---------------------------------------------------------------------------

vocab:
  words:
    oclock: "TRANSLATE: o'clock"         # e.g. "Uhr" in German
    past: "TRANSLATE: past"              # e.g. "nach" -- delete if not used
    to: "TRANSLATE: to"                  # e.g. "vor" -- delete if not used
    quarter: "TRANSLATE: quarter"        # e.g. "Viertel"
    half: "TRANSLATE: half"              # e.g. "halb"
    oh: "TRANSLATE: oh"                  # spoken before single-digit minutes, e.g. "oh nine"
    zero: "TRANSLATE: zero"              # numeric zero
    hundred: "TRANSLATE: hundred"        # used in operational mode, e.g. "thirteen hundred"
    hours: "TRANSLATE: hours"            # used in operational mode, e.g. "thirteen hundred hours"
    midnight: "TRANSLATE: midnight"
    noon: "TRANSLATE: noon"
    almost: "TRANSLATE: almost"          # used for e.g. "almost nine" near the hour

  menu:
    enter: "TRANSLATE: settings"
    exit: "TRANSLATE: done"
    set_time: "TRANSLATE: set time"
    set_alarm: "TRANSLATE: set alarm"
    alarm_enabled: "TRANSLATE: enable alarm"
    alarm_tone: "TRANSLATE: alarm tone"
    voice: "TRANSLATE: voice"
    announce_interval: "TRANSLATE: announcement interval"
    mode: "TRANSLATE: time format"

  toggle:
    on: "TRANSLATE: on"
    off: "TRANSLATE: off"

  interval:
    hourly: "TRANSLATE: every hour"
    half: "TRANSLATE: every half hour"
    quarter: "TRANSLATE: every quarter hour"

  voice:
    name: "TRANSLATE: LANGUAGE_NAME"     # e.g. "Deutsch" -- spoken when selected in menu

  mode:
    operational: "TRANSLATE: operational"
    broadcast: "TRANSLATE: broadcast"
    standard: "TRANSLATE: standard"
    casual: "TRANSLATE: casual"

  number_words:
    0: "TRANSLATE: zero"
    1: "TRANSLATE: one"
    2: "TRANSLATE: two"
    3: "TRANSLATE: three"
    4: "TRANSLATE: four"
    5: "TRANSLATE: five"
    6: "TRANSLATE: six"
    7: "TRANSLATE: seven"
    8: "TRANSLATE: eight"
    9: "TRANSLATE: nine"
    10: "TRANSLATE: ten"
    11: "TRANSLATE: eleven"
    12: "TRANSLATE: twelve"
    13: "TRANSLATE: thirteen"
    14: "TRANSLATE: fourteen"
    15: "TRANSLATE: fifteen"
    16: "TRANSLATE: sixteen"
    17: "TRANSLATE: seventeen"
    18: "TRANSLATE: eighteen"
    19: "TRANSLATE: nineteen"
    20: "TRANSLATE: twenty"
    21: "TRANSLATE: twenty one"
    22: "TRANSLATE: twenty two"
    23: "TRANSLATE: twenty three"
    24: "TRANSLATE: twenty four"
    25: "TRANSLATE: twenty five"
    26: "TRANSLATE: twenty six"
    27: "TRANSLATE: twenty seven"
    28: "TRANSLATE: twenty eight"
    29: "TRANSLATE: twenty nine"
    30: "TRANSLATE: thirty"
    31: "TRANSLATE: thirty one"
    32: "TRANSLATE: thirty two"
    33: "TRANSLATE: thirty three"
    34: "TRANSLATE: thirty four"
    35: "TRANSLATE: thirty five"
    36: "TRANSLATE: thirty six"
