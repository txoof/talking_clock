    46: "TRANSLATE: forty six"
    47: "TRANSLATE: forty seven"
    48: "TRANSLATE: forty eight"
    49: "TRANSLATE: forty nine"
    50: "TRANSLATE: fifty"
    51: "TRANSLATE: fifty one"
    52: "TRANSLATE: fifty two"
